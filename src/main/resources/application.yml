server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: immune-sentinel
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:immune_sentinel}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  thymeleaf:
    cache: ${THYMELEAF_CACHE:true}
    prefix: classpath:/templates/
    suffix: .html
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sentinel:
  base-url: ${SENTINEL_BASE_URL:http://localhost:8080}
  token-secret: ${SENTINEL_TOKEN_SECRET:change-me-to-a-long-random-string}
  admin-token: ${SENTINEL_ADMIN_TOKEN:please-set-admin-token}
  token-ttl-hours: 48
  storage:
    local-dir: ${SENTINEL_STORAGE_DIR:/data/immune-sentinel/uploads}
    public-prefix: /files

logging:
  level:
    root: INFO
    com.immunesentinel: DEBUG
  file:
    name: ${LOG_DIR:./logs}/immune-sentinel.log
