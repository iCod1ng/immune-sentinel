# 内嵌 Web 服务配置
server:
  # HTTP 监听端口
  port: 8080
  servlet:
    # 应用上下文路径，/ 表示根路径
    context-path: /

# Spring 框架基础配置
spring:
  application:
    # 应用名（用于日志、监控标识）
    name: immune-sentinel
  datasource:
    # 数据库连接串，支持通过环境变量覆盖主机、端口、库名
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:immune_sentinel}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    # 数据库用户名（可由 DB_USER 覆盖）
    username: ${DB_USER:root}
    # 数据库密码（可由 DB_PASSWORD 覆盖）
    password: ${DB_PASSWORD:root}
    # MySQL JDBC 驱动类
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # Hikari 连接池最大连接数
      maximum-pool-size: 8
      # Hikari 保持的最小空闲连接数
      minimum-idle: 2
  flyway:
    # 是否启用 Flyway 自动迁移
    enabled: true
    # 已有库基线迁移开关，避免非空库首次启动失败
    baseline-on-migrate: true
    # Flyway SQL 迁移脚本路径
    locations: classpath:db/migration
  thymeleaf:
    # 模板缓存开关，生产建议 true，开发建议 false
    cache: ${THYMELEAF_CACHE:true}
    # 模板前缀目录
    prefix: classpath:/templates/
    # 模板文件后缀
    suffix: .html
  jackson:
    # JSON 序列化时区
    time-zone: Asia/Shanghai
    # 日期时间序列化格式
    date-format: yyyy-MM-dd HH:mm:ss

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    # 下划线字段自动映射为驼峰属性
    map-underscore-to-camel-case: true
    # SQL 日志实现（当前关闭 SQL 打印）
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      # 主键策略：数据库自增
      id-type: auto
      # 逻辑删除字段名
      logic-delete-field: deleted
      # 逻辑删除值
      logic-delete-value: 1
      # 逻辑未删除值
      logic-not-delete-value: 0

# 业务系统自定义配置
sentinel:
  # 对外访问基地址（用于生成回填链接）
  base-url: ${SENTINEL_BASE_URL:http://localhost:8080}
  # 填报 token 签名密钥（生产必须使用高强度随机值）
  token-secret: ${SENTINEL_TOKEN_SECRET:change-me-to-a-long-random-string}
  # 管理接口鉴权口令（请求头 X-Admin-Token）
  admin-token: ${SENTINEL_ADMIN_TOKEN:please-set-admin-token}
  # 回填 token 过期时长（小时）
  token-ttl-hours: 48
  storage:
    # 本地文件存储目录
    local-dir: ${SENTINEL_STORAGE_DIR:/data/immune-sentinel/uploads}
    # 对外静态访问前缀
    public-prefix: /files

# 日志配置
logging:
  level:
    # 全局日志级别
    root: INFO
    # 本项目包日志级别
    com.immunesentinel: DEBUG
  file:
    # 日志文件路径（可由 LOG_DIR 覆盖目录）
    name: ${LOG_DIR:./logs}/immune-sentinel.log
