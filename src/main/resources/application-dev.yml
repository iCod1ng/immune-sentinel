# 开发环境覆盖配置
spring:
  thymeleaf:
    # 开发环境关闭模板缓存，便于实时看到页面改动
    cache: false
  datasource:
    # 开发环境数据库连接串（仍支持 DB_HOST/DB_PORT/DB_NAME 覆盖）
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:immune_sentinel}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    # 开发环境数据库用户名
    username: ${DB_USER:root}
    # 开发环境数据库密码
    password: ${DB_PASSWORD:root}

# 开发环境业务配置覆盖
sentinel:
  # 开发环境访问地址
  base-url: http://localhost:8080
  # 开发环境签名密钥（仅开发使用）
  token-secret: dev-secret-do-not-use-in-prod
  storage:
    # 开发环境本地存储目录（相对项目根目录）
    local-dir: ./data/uploads
